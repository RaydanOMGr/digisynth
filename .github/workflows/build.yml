name: Build

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Chmod ./gradlew
        run: chmod +x ./gradlew

      - name: Build Windows jar
        run: ./gradlew shadowJar -PlwjglNatives=natives-windows

      - name: Rename Windows jar
        run: |
          mkdir -p build/output
          cp build/libs/*-all.jar build/output/digisynth-windows.jar

      - name: Build Linux jar
        run: ./gradlew shadowJar -PlwjglNatives=natives-linux

      - name: Rename Linux jar
        run: |
          cp build/libs/*-all.jar build/output/digisynth-linux.jar

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: digisynth-builds
          path: build/output/*.jar